aid: financial-regulation
name: Financial Regulation
description: >-
  Financial regulation is the body of laws, rules, and supervisory frameworks
  governing financial markets, banks, broker-dealers, asset managers, payment
  providers, and crypto firms. Major regulators include the U.S. SEC, FINRA,
  CFTC, OCC, FRB, FDIC, FinCEN, CFPB; the UK FCA and PRA; the EU ESMA, EBA,
  and EIOPA; and global bodies like IOSCO and the Basel Committee. Core
  frameworks include MiFID II / MiFIR, Basel III, Dodd-Frank, Sarbanes-Oxley,
  EMIR, PSD2, GDPR, AML / KYC (FATF), and FATCA / CRS reporting.
